<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="##">
    <meta name="keywords" content="##">
    <meta name="author" content="##">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap first so our CSS can override it -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Our CSS after Bootstrap so it wins -->
    <link href="style/style-variables.css" rel="stylesheet">
    <link href="style/styleForms.css" rel="stylesheet">

    <title>Login</title>
</head>

<body>

    <!--Navigation Bar-->
    <div id="navbar-placeholder"></div>
    <script src="script/navbar.js"></script>

    <main>
        <!--Welcome Section + Login Form-->
        <section class="form-page-section">
            <div class="container d-flex flex-column align-items-center">
                <h1 class="text-center mb-2">Login</h1>
                <p class="text-center text-muted mb-4">Welcome back! Access your DinoShop account.</p>

                <div class="card shadow p-4" style="width: 100%; max-width: 500px;">
                    <div class="card-body">
                        <!--Login Form-->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label">Email</label>
                                <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email"
                                    name="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="loginPassword" class="form-label">Password</label>
                                <input type="password" class="form-control" id="loginPassword"
                                    placeholder="Enter your password" name="password" required>
                            </div>

                            <div id="loginMessage" class="mb-3 text-danger"></div>

                            <div class="mb-3">
                                <button type="submit" class="btn btn-primary w-100">Login</button>
                            </div>
                        </form>

                        <!--Linked to Create Account Page-->
                        <p class="text-center mt-3 mb-0">
                            Don’t have an account?
                            <a href="createAccount.html">Create New Account</a>
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!--Footer-->
            <footer class="py-4">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-3">
                <div class="d-flex align-items-center gap-2">
                    <span style="font-size:1.4rem;">🦖</span>
                    <span style="font-family:var(--font-heading);color:var(--accent);font-size:1rem;font-weight:700;letter-spacing:1px;">RAWW FACTOR</span>
                </div>
            </div>
            <p class="text-center mb-0" style="font-size:0.8rem;color:var(--muted);border-top:1px solid var(--border);padding-top:1rem;">
                &copy; 2025 The Raww Factor. All rights reserved. No dinosaurs were harmed in the making of this website.
            </p>
        </div>
    </footer>

    <script src="script/cart.js"></script> 
    <script src="script/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
