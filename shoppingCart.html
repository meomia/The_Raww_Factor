<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Basic page setup -->
  <meta charset="UTF-8">
  <meta name="description" content="Shopping cart page">
  <meta name="keywords" content="shopping cart, dinosaurs, ecommerce">
  <meta name="author" content="##">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap first so our CSS can override it -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Our CSS after Bootstrap so it wins -->
  <link href="style/style-variables.css" rel="stylesheet">
  <link href="style/styleCart.css" rel="stylesheet">

  <title>Shopping Cart</title>
</head>

<body class="">

  <!--Navigation Bar-->
  <div id="navbar-placeholder"></div>
  <script src="script/navbar.js"></script>


  <!--Page Header-->
  <header class="cart-header">
    <div class="container">
      <h1 class="mb-1">Your Shopping Cart</h1>
      <p class="text-muted mb-0">Review your selected dinos before checkout</p>
    </div>
  </header>

  <!--Shopping Cart Section-->
  <main class="py-3">
    <div class="container">
      <div class="row g-4 align-items-start">

        <!--Cart Items Column-->
        <div class="col-lg-8">
          <div class="card">
            <div class="card-body">

              <!--Section Title-->
              <h2 class="h4 mb-4">Cart Items</h2>

              <!-- Dynamic cart items injected here by renderCart() -->
              <div id="cart-items"></div>

              <!--Continue Shopping Button-->
              <a href="dinoShop.html" class="btn btn-raww-outline mt-3">Continue Shopping</a>

            </div>
          </div>
        </div>

        <!--Order Summary Column-->
        <aside class="col-lg-4">
          <div class="order-summary">
            <h2>Order Summary</h2>
            <div class="summary-row">
              <span>Items</span>
              <span><span id="cart-count">0</span> items</span>
            </div>
            <div class="summary-row">
              <span>Subtotal</span>
              <span><span id="cart-subtotal">0</span> DKK</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span>500 DKK</span>
            </div>
            <div class="summary-total">
              <span>Total</span>
              <span><span id="cart-total">0</span> DKK</span>
            </div>
            <button class="btn btn-raww-primary w-100 mt-4 mb-2" onclick="handleCheckout()">Proceed to Checkout</button>
            <button class="btn btn-raww-outline w-100" onclick="handleClearCart()">Clear Cart</button>
          </div>
        </aside>

      </div>
    </div>
  </main>

  <!--Footer-->
          <footer class="py-4">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-3">
                <div class="d-flex align-items-center gap-2">
                    <span style="font-size:1.4rem;">🦖</span>
                    <span style="font-family:var(--font-heading);color:var(--accent);font-size:1rem;font-weight:700;letter-spacing:1px;">RAWW FACTOR</span>
                </div>
            </div>
            <p class="text-center mb-0" style="font-size:0.8rem;color:var(--muted);border-top:1px solid var(--border);padding-top:1rem;">
                &copy; 2025 The Raww Factor. All rights reserved. No dinosaurs were harmed in the making of this website.
            </p>
        </div>
    </footer>

  <!-- Cart engine scripts -->
  <script src="script/products.js"></script>
  <script src="script/cart.js"></script>
  <!-- Authentication Script (for login/logout functionality in navbar) -->
  <script src="script/auth.js"></script>

  <script>

    // --- Render cart items ---
    function renderCart() {
      const itemsEl = document.getElementById("cart-items");
      const totalEl = document.getElementById("cart-total");
      const subtotalEl = document.getElementById("cart-subtotal");
      const countEl = document.getElementById("cart-count");

      const subtotal = getTotal();
      const shipping = 500;

      countEl.textContent = getItemCount();
      subtotalEl.textContent = subtotal;
      totalEl.textContent = subtotal + shipping;

      if (cart.length === 0) {
        itemsEl.innerHTML = `
            <div class="py-4" style="color:var(--muted);">
              <p class="mb-0">Your cart is empty. Use the button below to browse our collection.</p>
            </div>`;
        return;
      }

      itemsEl.innerHTML = cart.map(item => `
          <div class="cart-item">
            <img src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-category">${item.category}</div>
              <div class="cart-item-price">${item.price} DKK each</div>
            </div>
            <div class="qty-controls">
              <button class="btn btn-outline-secondary btn-sm"
                onclick="handleUpdateQuantity(${item.id}, ${item.quantity - 1})">−</button>
              <span class="fw-bold">${item.quantity}</span>
              <button class="btn btn-outline-secondary btn-sm"
                onclick="handleUpdateQuantity(${item.id}, ${item.quantity + 1})">+</button>
            </div>
            <div>
              <div class="cart-item-subtotal">${item.price * item.quantity} DKK</div>
              <button class="btn btn-outline-danger btn-sm mt-1"
                onclick="handleRemoveItem(${item.id})">Remove</button>
            </div>
          </div>
        `).join("");
    }

    // --- Event handlers ---
    function handleRemoveItem(productId) {
      removeItem(productId);
      renderCart();
    }

    function handleUpdateQuantity(productId, quantity) {
      updateQuantity(productId, quantity);
      renderCart();
    }

    function handleClearCart() {
      clearCart();
      renderCart();
    }

    //This function handles pop-up
    function handleCheckout() {
      const currentUser = getCurrentUser();

      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }

      if (!currentUser) {
        localStorage.setItem("pendingCheckout", "true");
        alert("Please log in before checkout.");
        window.location.href = "login.html";
        return;
      }

      alert(`Thank you, ${currentUser.name}! Your new family member is on the way and is now being prepared for shipping.`);

      clearCart();
      renderCart();
    }

    // --- Init ---
    // loadProducts().then(() => {
    //   loadCart();
    //   renderCart();
    // });
  loadProducts().then(async () => {

    // check if user is logged in
    const currentUser = getCurrentUser();

    if (currentUser) {
      // logged in → load basket from server
      const basket = await getBasket(currentUser.id);

      if (basket && basket.items) {
        // map server items to frontend cart format
        cart = basket.items.map(item => {
          const fullProduct = getProductById(item.productId);
          return {
            id: item.productId,
            name: item.name,
            price: item.price,
            quantity: item.quantity,
            image: fullProduct ? fullProduct.mainImage : '',
            category: fullProduct ? fullProduct.productType : ''
          };
        });
      }

    } else {
      // guest → load from localStorage as before
      loadCart();
    }
    // render either way
    renderCart();
  });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
